# Shared lab defaults — keep runs within ~1–2 h on 2-node Athena (2×1 GPU).
# Adjust after validation on your grant.

experiment_name: cifar10_tune_lab

data_dir: null  # null => use $SCRATCH/data/cifar10 or --data-dir

num_samples: 12
max_epochs: 3
grace_period: 1

cpus_per_trial: 2
gpus_per_trial: null  # set via CLI: 1 on Athena, 0 on Ares

num_workers: 4  # DataLoader workers per trial (lower on CPU if needed)

search_space:
  l1: [32, 64, 128]
  l2: [32, 64, 128]
  lr_min: 1.0e-3
  lr_max: 1.0e-1
  batch_size: [8, 16]

storage_path: null  # null => $SCRATCH/ray_results
